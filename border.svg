<svg viewBox="0 0 800 80" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .frame {
        fill: none;
        stroke: #e8f0fe;
        stroke-width: 1;
        opacity: 0.25;
      }
      .trace {
        fill: none;
        stroke: url(#traceGrad);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 160 1480;
        stroke-dashoffset: 0;
        animation: trace 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .trace-trail {
        fill: none;
        stroke: url(#trailGrad);
        stroke-width: 1;
        stroke-linecap: round;
        stroke-dasharray: 80 1560;
        stroke-dashoffset: 40;
        animation: trace 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        opacity: 0.4;
      }
      @keyframes trace {
        0%   { stroke-dashoffset: 1640; }
        100% { stroke-dashoffset: 0; }
      }
    </style>
    <linearGradient id="traceGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0" />
      <stop offset="40%"  stop-color="#7baaf7" />
      <stop offset="70%"  stop-color="#ffffff" />
      <stop offset="100%" stop-color="#4285f4" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="trailGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%"   stop-color="#4285f4" stop-opacity="0" />
      <stop offset="50%"  stop-color="#aecbfa" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Static background frame -->
  <rect class="frame" x="2" y="2" width="796" height="76" rx="6" ry="6" />

  <!-- Trailing glow -->
  <rect class="trace-trail" x="2" y="2" width="796" height="76" rx="6" ry="6" />

  <!-- Main trace line -->
  <rect class="trace" x="2" y="2" width="796" height="76" rx="6" ry="6" />
</svg>

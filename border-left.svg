<svg viewBox="0 0 6 1200" width="6" height="1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Static dim background line -->
  <line x1="3" y1="1200" x2="3" y2="0" stroke="#4285f4" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Animated trace using SMIL - line goes bottom to top -->
  <line x1="3" y1="1200" x2="3" y2="0"
        stroke="#7baaf7" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="80 1200" stroke-dashoffset="1280">
    <animate attributeName="stroke-dashoffset"
             values="1280;1280; -80"
             keyTimes="0;0.7;1"
             dur="6s"
             repeatCount="indefinite"/>
    <animate attributeName="stroke"
             values="#7baaf7;#7baaf7;#ffffff"
             keyTimes="0;0.7;1"
             dur="6s"
             repeatCount="indefinite"/>
  </line>
</svg>

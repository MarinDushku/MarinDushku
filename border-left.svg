<svg viewBox="0 0 6 1200" width="6" height="1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4285f4" stop-opacity="0"/>
      <stop offset="40%" stop-color="#7baaf7"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#4285f4" stop-opacity="0"/>
    </linearGradient>
    <style>
      .bg { stroke: #4285f4; stroke-opacity: 0.15; }
      .trace { stroke: url(#g3); stroke-dasharray: 200 1000; animation: sweep 3s linear infinite; }
      @keyframes sweep { from { stroke-dashoffset: 1200; } to { stroke-dashoffset: -1200; } }
    </style>
  </defs>
  <line class="bg" x1="3" y1="0" x2="3" y2="1200" stroke-width="1"/>
  <line class="trace" x1="3" y1="0" x2="3" y2="1200" stroke-width="2" stroke-linecap="round"/>
</svg>

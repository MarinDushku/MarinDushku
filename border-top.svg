<svg viewBox="0 0 800 6" width="100%" height="6" xmlns="http://www.w3.org/2000/svg">
  <!-- Static dim background line -->
  <line x1="0" y1="3" x2="800" y2="3" stroke="#4285f4" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Animated trace using SMIL -->
  <line x1="0" y1="3" x2="800" y2="3"
        stroke="#7baaf7" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="80 800" stroke-dashoffset="880">
    <animate attributeName="stroke-dashoffset"
             values="880;-80; 880;880"
             keyTimes="0;0.2;0.201;1"
             dur="6s"
             repeatCount="indefinite"/>
    <animate attributeName="stroke"
             values="#7baaf7;#ffffff;#7baaf7;#7baaf7"
             keyTimes="0;0.1;0.2;1"
             dur="6s"
             repeatCount="indefinite"/>
  </line>
</svg>

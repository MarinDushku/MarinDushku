<svg viewBox="0 0 6 1200" width="6" height="1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Static dim background line -->
  <line x1="3" y1="0" x2="3" y2="1200" stroke="#4285f4" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Animated trace using SMIL -->
  <line x1="3" y1="0" x2="3" y2="1200"
        stroke="#7baaf7" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="80 1200" stroke-dashoffset="1280">
    <animate attributeName="stroke-dashoffset"
             values="1280;1280; -80; 1280;1280"
             keyTimes="0;0.2;0.5;0.501;1"
             dur="6s"
             repeatCount="indefinite"/>
    <animate attributeName="stroke"
             values="#7baaf7;#7baaf7;#ffffff;#7baaf7;#7baaf7"
             keyTimes="0;0.2;0.35;0.5;1"
             dur="6s"
             repeatCount="indefinite"/>
  </line>
</svg>

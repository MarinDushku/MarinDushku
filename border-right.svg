<svg viewBox="0 0 6 1200" width="6" height="1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4285f4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#4285f4" stop-opacity="0"/>
    </linearGradient>
    <style>
      .bg { stroke: #4285f4; stroke-opacity: 0.15; fill: none; }
      .trace { stroke: url(#g); fill: none; stroke-dasharray: 80 1200;
        animation: t 6s linear infinite; }
      @keyframes t {
        0%    { stroke-dashoffset: 1280; }
        20%   { stroke-dashoffset: 1280; }
        50%   { stroke-dashoffset: -80;  }
        50.1% { stroke-dashoffset: 1280; }
        100%  { stroke-dashoffset: 1280; }
      }
    </style>
  </defs>
  <line class="bg" x1="3" y1="0" x2="3" y2="1200" stroke-width="1"/>
  <line class="trace" x1="3" y1="0" x2="3" y2="1200" stroke-width="2" stroke-linecap="round"/>
</svg>

<svg viewBox="0 0 800 6" width="100%" height="6" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4285f4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#4285f4" stop-opacity="0"/>
    </linearGradient>
    <style>
      .bg { stroke: #4285f4; stroke-opacity: 0.15; fill: none; }
      .trace { stroke: url(#g); fill: none; stroke-dasharray: 80 800;
        animation: t 6s linear infinite; }
      @keyframes t {
        0%    { stroke-dashoffset: 880; }
        50%   { stroke-dashoffset: 880; }
        70%   { stroke-dashoffset: -80;  }
        70.1% { stroke-dashoffset: 880; }
        100%  { stroke-dashoffset: 880; }
      }
    </style>
  </defs>
  <!-- Path goes right to left so trace flows right→left -->
  <line class="bg" x1="800" y1="3" x2="0" y2="3" stroke-width="1"/>
  <line class="trace" x1="800" y1="3" x2="0" y2="3" stroke-width="2" stroke-linecap="round"/>
</svg>

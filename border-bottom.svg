<svg viewBox="0 0 800 6" width="100%" height="6" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285f4" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#7baaf7"/>
      <stop offset="100%" stop-color="#4285f4" stop-opacity="0"/>
    </linearGradient>
    <style>
      .bg { stroke: #4285f4; stroke-opacity: 0.15; }
      .trace { stroke: url(#g2); stroke-dasharray: 200 600; animation: sweep 3s linear infinite; }
      @keyframes sweep { from { stroke-dashoffset: -800; } to { stroke-dashoffset: 800; } }
    </style>
  </defs>
  <line class="bg" x1="0" y1="3" x2="800" y2="3" stroke-width="1"/>
  <line class="trace" x1="0" y1="3" x2="800" y2="3" stroke-width="2" stroke-linecap="round"/>
</svg>
